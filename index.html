    rel="stylesheet">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            // Light Theme Hues
            primary: '#E11D48',      // Deep Rose
            secondary: '#F472B6',    // Soft Pink  
            accent: '#FDE68A',       // Champagne Gold
            dark: '#881337',         // Burgundy
            cream: '#FFE4E6',        // Soft Pink background
            charcoal: '#4C0519',     // Deep Burgundy text

            // Obsidian Dark Theme Hues
            obsidian: '#0A0506',     // Dark Obsidian background
            obsidianCard: '#12090B', // Dark card
            obsidianText: '#F3F4F6', // Dark mode text
          },
          fontFamily: {
            display: ['Outfit', 'sans-serif'],
            body: ['Inter', 'sans-serif'],
            accent: ['Cormorant Garamond', 'serif'], // Elegant serif accent for light mode
            handwriting: ['Patrick Hand', 'Architects Daughter', 'Caveat', 'cursive'],
            typewriter: ['Special Elite', 'monospace'],
          },
          animation: {
            'spin-slow': 'spin 20s linear infinite',
            'float': 'float 6s ease-in-out infinite',
          },
          keyframes: {
            float: {
              '0%, 100%': { transform: 'translateY(0)' },
              '50%': { transform: 'translateY(-20px)' },
            }
          }
        }
      }
    }
  </script>
  <style>
    html.lenis, html.lenis body {
      height: auto;
    }

    .lenis.lenis-smooth {
      scroll-behavior: auto !important;
    }

    .lenis.lenis-smooth [data-lenis-prevent] {
      overflow: clip;
    }

    .lenis.lenis-stopped {
      overflow: hidden;
    }

    .lenis.lenis-smooth iframe {
      pointer-events: none;
    }

    body {
      overflow-x: hidden;
      font-family: 'Inter', sans-serif;
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    html:not(.dark) body {
      background-color: #FFE4E6;
      color: #4C0519;
    }

    html.dark body {
      background-color: #0A0506;
      color: #F3F4F6;
    }

    /* Custom dark scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    html:not(.dark) ::-webkit-scrollbar-track {
      background: #FFE4E6;
    }

    html:not(.dark) ::-webkit-scrollbar-thumb {
      background: #F472B6;
      border-radius: 4px;
    }

    html.dark ::-webkit-scrollbar-track {
      background: #0A0506;
    }

    html.dark ::-webkit-scrollbar-thumb {
      background: #271418;
      border-radius: 4px;
    }

    html.dark ::-webkit-scrollbar-thumb:hover {
      background: #F43F5E;
    }

    .text-gradient-gold {
      background: linear-gradient(135deg, #F59E0B 0%, #FBBF24 50%, #F59E0B 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      background-size: 200% auto;
      animation: shine 5s linear infinite;
    }

    .text-gradient-pink {
      background: linear-gradient(135deg, #F43F5E 0%, #EC4899 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    @keyframes shine {
      to {
        background-position: 200% center;
      }
    }

    .glass-card {
      background: rgba(24, 17, 19, 0.4);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    /* Push pin decoration for sticky notes */
    .push-pin {
      position: absolute;
      top: -8px;
      left: 50%;
      transform: translateX(-50%);
      width: 14px;
      height: 14px;
      background-color: #ef4444;
      /* Pin top red color */
      border-radius: 50%;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.15), inset 0 -2px 3px rgba(0, 0, 0, 0.25);
      z-index: 20;
    }

    .push-pin::after {
      content: '';
      position: absolute;
      top: 10px;
      left: 5px;
      width: 2px;
      height: 12px;
      background-color: #94a3b8;
      /* Pin metal needle */
      transform: rotate(15deg);
      border-radius: 1px;
    }

    .obsidian-panel {
      background: rgba(18, 9, 11, 0.6);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(244, 63, 94, 0.08);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
    }

    .cork-board {
      background-color: #edd3bc;
      background-image: radial-gradient(#dca47b 15%, transparent 16%), radial-gradient(#dca47b 15%, transparent 16%);
      background-size: 16px 16px;
      background-position: 0 0, 8px 8px;
      border: 12px solid #5c4033;
      box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.2);
    }
  </style>
  <script type="importmap">
{
  "imports": {

}
</script>

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then((reg) => console.log('ServiceWorker registered:', reg.scope))
          .catch((err) => console.error('ServiceWorker registration failed:', err));
      });
    }
