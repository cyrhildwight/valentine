<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>An Anonymous Love Confession for You</title>
  <!-- Import fonts for supported email clients -->
  <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Special+Elite&family=Inter:wght@400;700&display=swap" rel="stylesheet">
  <style>
    /* Global Resets */
    body, table, td, a { -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }
    table, td { mso-table-lspace: 0pt; mso-table-rspace: 0pt; }
    img { -ms-interpolation-mode: bicubic; }
    
    /* Responsive styling */
    @media screen and (max-width: 480px) {
      .card-container {
        width: 100% !important;
        max-width: 100% !important;
      }
      .col-left {
        width: 100% !important;
        display: block !important;
        border-right: none !important;
        border-bottom: 1px dashed rgba(120,53,4,0.15) !important;
        padding-right: 0 !important;
        padding-bottom: 20px !important;
        margin-bottom: 20px !important;
      }
      .col-right {
        width: 100% !important;
        display: block !important;
        padding-left: 0 !important;
      }
    }
  </style>
</head>
<body style="margin: 0; padding: 0; background-color: #fff0f2; font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased;">
  <table border="0" cellpadding="0" cellspacing="0" width="100%" style="table-layout: fixed; background-color: #fff0f2;">
    <tr>
      <td align="center" style="padding: 40px 10px;">
        
        <!-- Outer Cardstock Table Frame -->
        <table class="card-container" border="0" cellpadding="0" cellspacing="0" width="550" style="background-color: {{card_bg}}; border: {{card_border}}; border-radius: 24px; box-shadow: {{card_shadow}}; overflow: hidden; border-collapse: separate; transition: all 0.3s ease;">
          <tr>
            <td style="padding: 16px;">
              
              <!-- Inner Paper Card Table Note -->
              <table border="0" cellpadding="0" cellspacing="0" width="100%" style="background-color: {{inner_bg}}; background-image: {{card_bg_image}}; background-size: {{card_bg_size}}; border: {{inner_border}}; border-radius: 18px; border-collapse: separate;">
                <tr>
                  <td style="padding: 24px; position: relative;">
                    
                    <!-- Main Postcard Grid Table -->
                    <table border="0" cellpadding="0" cellspacing="0" width="100%">
                      <tr>
                        <!-- Left Column (Message Side) -->
                        <td class="col-left" width="58%" valign="top" style="padding-right: 20px; border-right: 1px dashed {{inner_border}}; font-family: {{{font_family}}}; color: {{text_color}};">
                          <table border="0" cellpadding="0" cellspacing="0" width="100%">
                            <tr>
                              <td valign="middle" style="height: 120px; padding-bottom: 15px;">
                                <p style="margin: 0; font-size: 15px; line-height: 1.6; font-style: italic; font-weight: normal;">
                                  &ldquo;{{message}}&rdquo;
                                </p>
                              </td>
                            </tr>
                            <tr>
                              <td style="border-top: 1px dashed {{inner_border}}; padding-top: 10px;">
                                <span style="font-size: 13px; opacity: 0.8;">
                                  From: <strong style="font-weight: bold;">{{from_name}}</strong>
                                </span>
                              </td>
                            </tr>
                          </table>
                        </td>
                        
                        <!-- Right Column (Address & Stamp Side) -->
                        <td class="col-right" width="42%" valign="top" style="padding-left: 20px; font-family: 'Inter', sans-serif;">
                          <table border="0" cellpadding="0" cellspacing="0" width="100%">
                            
                            <!-- Stamp -->
                            <tr>
                              <td align="right" style="padding-bottom: 15px;">
                                <table border="0" cellpadding="0" cellspacing="0" style="width: 42px; height: 52px; border: {{stamp_border}}; background-color: {{stamp_bg}}; border-radius: 4px; border-collapse: separate;">
                                  <tr>
                                    <td align="center" valign="middle" style="padding: 4px; color: {{heart_color}};">
                                      <span style="font-size: 14px; line-height: 1;">&hearts;</span>
                                      <div style="font-size: 5px; font-weight: bold; text-transform: uppercase; letter-spacing: 1.5px; margin-top: 2px;">POST</div>
                                    </td>
                                  </tr>
                                </table>
                              </td>
                            </tr>
                            
                            <!-- Address Info -->
                            <tr>
                              <td style="padding-bottom: 15px;">
                                <div style="font-size: 9px; text-transform: uppercase; letter-spacing: 1px; color: {{heart_color}}; font-weight: bold; margin-bottom: 4px;">
                                  To: {{to_name}}
                                </div>
                                <div style="border-bottom: 1px dotted {{inner_border}}; height: 6px; width: 100%;"></div>
                                <div style="border-bottom: 1px dotted {{inner_border}}; height: 12px; width: 100%;"></div>
                              </td>
                            </tr>
                            
                            <!-- Watermark / Branding -->
                            <tr>
                              <td style="padding-bottom: 15px;">
                                <div style="font-size: 8px; color: {{text_color}}; opacity: 0.7; line-height: 1.3;">
                                  Sent via <a href="{{app_url}}" target="_blank" style="font-weight: bold; color: {{heart_color}}; text-decoration: none; border-bottom: 1px dotted {{heart_color}};">Whisper & Bloom</a>
                                  <div style="font-size: 7px; opacity: 0.6; margin-top: 1px;">{{app_domain}}</div>
                                </div>
                              </td>
                            </tr>
                            
                            <!-- Wax Seal -->
                            <tr>
                              <td align="right">
                                <table border="0" cellpadding="0" cellspacing="0" style="width: 28px; height: 28px; background-color: {{seal_bg}}; border-radius: 50%; border-collapse: separate; box-shadow: 0 2px 5px rgba(0,0,0,0.15);">
                                  <tr>
                                    <td align="center" valign="middle" style="color: {{seal_color}}; font-size: 10px; font-weight: bold; line-height: 1;">
                                      &hearts;
                                    </td>
                                  </tr>
                                </table>
                              </td>
                            </tr>
                            
                          </table>
                        </td>
                      </tr>
                    </table>
                    
                  </td>
                </tr>
              </table>
              
            </td>
          </tr>
        </table>
        
        <!-- Small Footer Info Below Card -->
        <table border="0" cellpadding="0" cellspacing="0" width="550" class="card-container" style="margin-top: 20px;">
          <tr>
            <td align="center" style="font-family: 'Inter', sans-serif; font-size: 11px; color: #a1a1aa; line-height: 1.5;">
              This letter was sent securely and anonymously. Your privacy is protected.<br>
              &copy; 2026 Whisper & Bloom. All rights reserved.
            </td>
          </tr>
        </table>
        
      </td>
    </tr>
  </table>
</body>
</html>
